    <script>
        // Starfield with parallax and hover region support
        (function() {
            const canvas = document.createElement('canvas');
            canvas.id = 'starfield';
            canvas.style.position = 'fixed';
            canvas.style.left = '0';
            canvas.style.top = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '-1';
            canvas.style.pointerEvents = 'none';
            document.body.appendChild(canvas);

            // create spotlight overlay element
            const spotlight = document.createElement('div');
            spotlight.id = 'spotlight';
            spotlight.innerHTML = '<div class="mask"></div><div class="rope" aria-hidden="true"></div><div class="head" aria-hidden="true"></div>';
            document.body.appendChild(spotlight);

            function showSpotlightAt(x, y) {
                spotlight.style.setProperty('--sx', x + 'px');
                spotlight.style.setProperty('--sy', y + 'px');
                spotlight.classList.add('active');
            }

            function hideSpotlight() {
                spotlight.classList.remove('active');
            }

            // expose to global so card handlers can use it
            window.Spotlight = {
                showAt: showSpotlightAt,
                hide: hideSpotlight
            };

            const ctx = canvas.getContext('2d');
            let W = 0, H = 0;
            const stars = [];
            let mouse = { x: 0, y: 0 };
            let hoverRegion = null; // {x,y,w,h,extraStars:[]}

            function dprResize() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                W = window.innerWidth;
                H = window.innerHeight;
                initStars();
            }

            function initStars() {
                stars.length = 0;
                // increase base density for a stronger background
                const baseCount = Math.max(220, Math.floor((W * H) / 4500));
                for (let i = 0; i < baseCount; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 2.2 + 0.6,
                        alpha: Math.random() * 0.6 + 0.4,
                        da: (Math.random() * 0.04) - 0.02,
                        depth: Math.random() * 1.1 + 0.2
                    });
                }
            }

            function addHoverExtras(region, mode = 'dark') {
                region.extraStars = [];
                if (mode === 'bounce') {
                    // denser, larger, faster bouncing stars for the modal
                    const extra = 260;
                    for (let i = 0; i < extra; i++) {
                        region.extraStars.push({
                            x: region.x + Math.random() * region.w,
                            y: region.y + Math.random() * region.h,
                            r: Math.random() * 3.6 + 1.2,
                            alpha: Math.random() * 0.8 + 0.6,
                            da: (Math.random() * 0.08) - 0.04,
                            vx: (Math.random() * 3.0) - 1.5,
                            vy: (Math.random() * 3.0) - 1.5
                        });
                    }
                } else {
                    // stronger static effect for card hover
                    const extra = 220;
                    for (let i = 0; i < extra; i++) {
                        region.extraStars.push({
                            x: region.x + Math.random() * region.w,
                            y: region.y + Math.random() * region.h,
                            r: Math.random() * 3.0 + 1.0,
                            alpha: Math.random() * 0.9 + 0.5,
                            da: (Math.random() * 0.06) - 0.03
                        });
                    }
                }
            }

            function setHoverRegion(rect, opts = {}) {
                hoverRegion = {
                    x: rect.left,
                    y: rect.top,
                    w: rect.width,
                    h: rect.height,
                    mode: opts.mode || 'dark',
                    extraStars: []
                };
                addHoverExtras(hoverRegion, hoverRegion.mode);
            }

            function clearHoverRegion() {
                hoverRegion = null;
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                // compute parallax offset
                const ox = (mouse.x - W / 2) / W;
                const oy = (mouse.y - H / 2) / H;

                // draw base stars
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    s.alpha += s.da;
                    if (s.alpha <= 0.05 || s.alpha >= 1) s.da = -s.da;
                    const px = s.x + ox * s.depth * 60;
                    const py = s.y + oy * s.depth * 60;
                    ctx.beginPath();
                    ctx.globalAlpha = s.alpha * 0.95;
                    ctx.fillStyle = '#ffffff';
                    // subtle glow for background stars
                    ctx.shadowBlur = Math.min(6, s.depth * 8);
                    ctx.shadowColor = 'rgba(255,255,255,0.55)';
                    ctx.arc(Math.round(px), Math.round(py), s.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // hover region: darken background in region and add extra stars
                if (hoverRegion) {
                    // draw rounded black region behind the card/modal and clip star drawing to rounded area
                    const radius = Math.min(32, Math.floor(Math.min(hoverRegion.w, hoverRegion.h) * 0.08));

                    // rounded rect path
                    function roundedRectPath(x, y, w, h, r) {
                        ctx.beginPath();
                        ctx.moveTo(x + r, y);
                        ctx.arcTo(x + w, y, x + w, y + h, r);
                        ctx.arcTo(x + w, y + h, x, y + h, r);
                        ctx.arcTo(x, y + h, x, y, r);
                        ctx.arcTo(x, y, x + w, y, r);
                        ctx.closePath();
                    }

                    ctx.save();
                    // fill rounded black background
                    ctx.fillStyle = 'rgba(0,0,0,1)';
                    roundedRectPath(hoverRegion.x, hoverRegion.y, hoverRegion.w, hoverRegion.h, radius);
                    ctx.fill();

                    // clip to rounded path so stars render inside rounded area
                    roundedRectPath(hoverRegion.x, hoverRegion.y, hoverRegion.w, hoverRegion.h, radius);
                    ctx.clip();

                    if (hoverRegion.mode === 'bounce') {
                        for (let i = 0; i < hoverRegion.extraStars.length; i++) {
                            const s = hoverRegion.extraStars[i];
                            s.x += s.vx;
                            s.y += s.vy;
                            if (s.x < hoverRegion.x) { s.x = hoverRegion.x; s.vx *= -1; }
                            if (s.x > hoverRegion.x + hoverRegion.w) { s.x = hoverRegion.x + hoverRegion.w; s.vx *= -1; }
                            if (s.y < hoverRegion.y) { s.y = hoverRegion.y; s.vy *= -1; }
                            if (s.y > hoverRegion.y + hoverRegion.h) { s.y = hoverRegion.y + hoverRegion.h; s.vy *= -1; }

                            s.alpha += s.da;
                            if (s.alpha <= 0.05 || s.alpha >= 1) s.da = -s.da;

                            ctx.beginPath();
                            ctx.globalAlpha = Math.min(1, s.alpha);
                            ctx.fillStyle = '#ffffff';
                            ctx.shadowBlur = 30;
                            ctx.shadowColor = 'rgba(255,255,255,0.98)';
                            ctx.arc(Math.round(s.x), Math.round(s.y), s.r, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    } else {
                        for (let i = 0; i < hoverRegion.extraStars.length; i++) {
                            const s = hoverRegion.extraStars[i];
                            s.alpha += s.da;
                            if (s.alpha <= 0.05 || s.alpha >= 1) s.da = -s.da;
                            ctx.beginPath();
                            ctx.globalAlpha = Math.min(1, s.alpha);
                            ctx.fillStyle = '#ffffff';
                            ctx.shadowBlur = 26;
                            ctx.shadowColor = 'rgba(255,255,255,0.96)';
                            ctx.arc(Math.round(s.x + ox * 8), Math.round(s.y + oy * 8), s.r, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }

                    ctx.restore();
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', dprResize);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            // expose API for cards to set hover region
            window.Starfield = {
                setHoverRegion: (rect) => setHoverRegion(rect),
                clearHoverRegion: () => clearHoverRegion()
            };

            dprResize();
            requestAnimationFrame(draw);
        })();

        let currentStudentId = null;

        function renderCards(filteredStudents) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const list = filteredStudents || students;

            list.forEach(student => {
                const card = document.createElement('div');
                card.className = `yearbook-card rounded-3xl overflow-hidden border border-slate-700 cursor-pointer group`;

                card.innerHTML = `
                    <div class="p-5 pb-6">
                        <!-- Photo Placeholder -->
                        <div class="photo-placeholder w-full aspect-square min-h-[220px] rounded-[1.5rem] flex items-center justify-center mb-5 overflow-hidden">
                            ${student.image ? `
                                <img src="${student.image}" alt="${student.name}" class="w-full h-full object-cover rounded-[1.5rem]" />
                            ` : `
                                <div class="w-24 h-24 md:w-28 md:h-28 rounded-full bg-slate-800/60 flex items-center justify-center border border-slate-600/50">
                                    <span class="profile-initials text-slate-200 text-5xl font-semibold tracking-[-2px]">${student.initials}</span>
                                </div>
                            `}
                        </div>

                        <!-- Name -->
                        <div class="student-name text-xl mb-2 tracking-tight">${student.name}</div>

                        <!-- Quote directly below photo -->
                        <div class="quote-text">
                            “${student.quote}”
                        </div>
                    </div>
                `;

                card.onclick = () => showModal(student.id);

                // hover handlers to trigger starfield region effects
                // spotlight + starfield interactions
                card.addEventListener('mouseenter', (ev) => {
                    const rect = card.getBoundingClientRect();
                    // position spotlight slightly below the top of the card
                    const sx = Math.round(rect.left + rect.width / 2);
                    const sy = Math.round(Math.max(96, rect.top + rect.height * 0.12));
                    if (window.Spotlight) window.Spotlight.showAt(sx, sy);
                    if (window.Starfield) window.Starfield.setHoverRegion(rect, { mode: 'dark' });
                });

                card.addEventListener('mousemove', (ev) => {
                    // gentle follow: move spotlight horizontally with the cursor within the card
                    const rect = card.getBoundingClientRect();
                    const sx = Math.round(rect.left + (ev.clientX - rect.left));
                    const sy = Math.round(Math.max(96, rect.top + rect.height * 0.12));
                    if (window.Spotlight) window.Spotlight.showAt(sx, sy);
                });

                card.addEventListener('mouseleave', () => {
                    if (window.Spotlight) window.Spotlight.hide();
                    if (window.Starfield) window.Starfield.clearHoverRegion();
                });

                grid.appendChild(card);
            });
        }

        function scrambleStudents() {
            for (let i = students.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [students[i], students[j]] = [students[j], students[i]];
            }
            renderCards(students);
        }

        function filterCards() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            
            if (!term) {
                renderCards(students);
                return;
            }

            const filtered = students.filter(s => 
                s.name.toLowerCase().includes(term) || 
                s.quote.toLowerCase().includes(term)
            );

            renderCards(filtered);
        }

        function showModal(id) {
            const student = students.find(s => s.id === id);
            if (!student) return;

            currentStudentId = id;

            document.getElementById('modal-name').textContent = student.name;
            document.getElementById('modal-quote').innerHTML = `“${student.quote}”`;

            const photo = document.getElementById('modal-photo');
            photo.innerHTML = student.image ? `
                <img src="${student.image}" alt="${student.name}" class="w-full h-full object-cover rounded-xl" />
            ` : `
                <span class="profile-initials text-slate-200 text-[42px] font-semibold tracking-[-2.5px]">${student.initials}</span>
            `;

            // hide spotlight while modal is open
            if (window.Spotlight) window.Spotlight.hide();
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');

            // trigger starfield bouncing-stars inside modal
            setTimeout(() => {
                const dialog = document.querySelector('#modal .modal');
                if (dialog && window.Starfield) {
                    const rect = dialog.getBoundingClientRect();
                    window.Starfield.setHoverRegion(rect, { mode: 'bounce' });
                }
            }, 60);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
            currentStudentId = null;
            if (window.Starfield) window.Starfield.clearHoverRegion();
            if (window.Spotlight) window.Spotlight.hide();
        }

        function openWelcomeDialog() {
            const dialog = document.getElementById('welcome-dialog');
            const button = document.getElementById('welcome-ok');
            const countdown = document.getElementById('welcome-countdown');

            if (!dialog || !button || !countdown) return;
            dialog.classList.remove('hidden');

            let remaining = 3;
            countdown.textContent = `Button activates in ${remaining} seconds...`;
            button.disabled = true;

            const intervalId = setInterval(() => {
                remaining -= 1;
                if (remaining > 0) {
                    countdown.textContent = `Button activates in ${remaining} seconds...`;
                } else {
                    clearInterval(intervalId);
                    countdown.textContent = 'You can now continue.';
                    button.disabled = false;
                }
            }, 1000);

            button.addEventListener('click', () => {
                if (!button.disabled) {
                    dialog.classList.add('hidden');
                }
            });
        }

        function init() {
            scrambleStudents();

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const main = document.getElementById('modal');
                    if (main && !main.classList.contains('hidden')) closeModal();
                }

                if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                }
            });

            openWelcomeDialog();

            // Sync search placeholder hint
            console.log('%c[Yearbook] Simple showcase version ready. Edit the students array to customize.', 'color:#64748b');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
